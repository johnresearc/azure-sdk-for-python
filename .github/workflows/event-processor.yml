name: GitHub Event Processor

on:
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write
  id-token: write
  contents: read

jobs:
  event-handler-with-azure:
    name: Handle Event (Simulation Mode)
    runs-on: ubuntu-latest
    steps:
      # --- MODIFICAÇÃO PARA PULAR O LOGIN REAL ---
      - name: 'Mock Azure Login'
        run: |
          echo "Simulando login para evitar erro AADSTS700213..."
          # Criamos variáveis fakes para o script não quebrar
          echo "LABEL_SERVICE_API_KEY=mock_key_123" >> $GITHUB_ENV
          echo "APP_CONFIG_ENDPOINT=https://mock.azure.io" >> $GITHUB_ENV
          
          # Criamos um comando 'az' falso que não faz nada
          echo '#!/bin/bash' > az
          echo 'exit 0' >> az
          chmod +x az
          sudo mv az /usr/bin/az
      # --- FIM DA MODIFICAÇÃO ---

      - name: Install GitHub Event Processor
        run: >
          dotnet tool install
          Azure.Sdk.Tools.GitHubEventProcessor
          --version 1.0.0-dev.20260129.1
          --add-source https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-net/nuget/v3/index.json
          --global
        shell: bash

      - name: Process Action Event
        run: |
          # Aqui é onde a injeção via Issue acontece
          github-event-processor ${{ github.event_name }} ${{ github.event_path }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL_SERVICE_API_KEY: ${{ env.LABEL_SERVICE_API_KEY }}
          APP_CONFIG_ENDPOINT: ${{ env.APP_CONFIG_ENDPOINT }}

      - name: Archive github event data
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: event
          path: ${{ github.event_path }}
