name: GitHub Event Processor

on:
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write
  id-token: write
  contents: read

jobs:
  event-handler-with-azure:
    name: Handle Event (Simulation)
    runs-on: ubuntu-latest
    steps:
      # --- PASSO MOCK: Substitui o login da Microsoft que dá erro ---
      - name: 'Mock Azure Authentication'
        run: |
          echo "Simulando ambiente autenticado..."
          # Criamos variáveis fakes para a ferramenta não reclamar
          echo "LABEL_SERVICE_API_KEY=mock-key-12345" >> $GITHUB_ENV
          echo "APP_CONFIG_ENDPOINT=https://mock.azure.io" >> $GITHUB_ENV
          
          # Criamos um binário 'az' falso
          echo '#!/bin/bash' > az
          echo 'exit 0' >> az
          chmod +x az
          sudo mv az /usr/bin/az

      # Instalação oficial da ferramenta da Microsoft
      - name: Install GitHub Event Processor
        run: >
          dotnet tool install
          Azure.Sdk.Tools.GitHubEventProcessor
          --version 1.0.0-dev.20260129.1
          --add-source https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-net/nuget/v3/index.json
          --global
        shell: bash

      # O PASSO ONDE O RCE ACONTECE
      - name: Process Action Event
        run: |
          # A ferramenta lê o JSON da sua Issue aqui
          github-event-processor ${{ github.event_name }} ${{ github.event_path }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL_SERVICE_API_KEY: ${{ env.LABEL_SERVICE_API_KEY }}
          APP_CONFIG_ENDPOINT: ${{ env.APP_CONFIG_ENDPOINT }}

      - name: Archive github event data
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: event
          path: ${{ github.event_path }}
