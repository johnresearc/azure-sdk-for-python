name: GitHub Event Processor

on:
  issues:
    types: [edited, labeled, opened, reopened, unlabeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [closed, labeled, opened, reopened, review_requested, synchronize, unlabeled]

permissions:
  issues: write
  pull-requests: write
  id-token: write
  contents: read

jobs:
  event-handler-with-azure:
    name: Handle ${{ github.event_name }} ${{ github.event.action }} event (SIMULATED)
    runs-on: ubuntu-latest
    steps:
      # --- INÍCIO DA MODIFICAÇÃO PARA SIMULAÇÃO ---
      - name: 'Az CLI Mock Login'
        if: ${{ github.event_name == 'issues' && github.event.action == 'opened' }}
        run: |
          echo "Simulando login para evitar erro de credenciais..."
          # Criamos variáveis de ambiente fakes para o script não quebrar
          echo "LABEL_SERVICE_API_KEY=mock_key_for_testing" >> $GITHUB_ENV
          echo "APP_CONFIG_ENDPOINT=https://mock.azureconfig.io" >> $GITHUB_ENV
          
          # Criamos um comando 'az' falso que apenas retorna um valor fake
          echo '#!/bin/bash' > az
          echo 'echo "mock_value"' >> az
          chmod +x az
          sudo mv az /usr/bin/az
      # --- FIM DA MODIFICAÇÃO ---

      # Mantemos a instalação original da ferramenta da Microsoft
      - name: Install GitHub Event Processor
        run: >
          dotnet tool install
          Azure.Sdk.Tools.GitHubEventProcessor
          --version 1.0.0-dev.20260129.1
          --add-source https://pkgs.dev.azure.com/azure-sdk/public/_packaging/azure-sdk-for-net/nuget/v3/index.json
          --global
        shell: bash

      # ESTE É O PASSO VULNERÁVEL QUE VAI LER SUA ISSUE
      - name: Process Action Event
        run: |
          github-event-processor ${{ github.event_name }} ${{ github.event_path }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL_SERVICE_API_KEY: ${{ env.LABEL_SERVICE_API_KEY }}
          APP_CONFIG_ENDPOINT: ${{ env.APP_CONFIG_ENDPOINT }}

      - name: Archive github event data
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: event
          path: ${{ github.event_path }}
